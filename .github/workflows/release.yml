name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get current tag
        id: current_tag
        run: |
          TAG="$(git tag --list 'v*.*.*' --sort=-version:refname | head -1)"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Determine next version
        id: next_version
        uses: orhun/git-cliff-action@v4
        with:
          args: --bumped-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if release is needed
        id: check
        run: |
          export PATH="$RUNNER_TEMP/git-cliff/bin:$PATH"
          CURRENT="${{ steps.current_tag.outputs.tag }}"
          NEXT="$(git-cliff --bumped-version 2>/dev/null | tail -1 | xargs)"

          if [ -z "$NEXT" ] || [ "$NEXT" = "$CURRENT" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No version bump needed (next: ${NEXT}, current: ${CURRENT})"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
            echo "Will release ${NEXT} (current: ${CURRENT})"
          fi

      - name: Generate changelog
        if: steps.check.outputs.skip == 'false'
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          args: --unreleased --strip header --tag ${{ steps.check.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.check.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.check.outputs.version }}" \
            --title "${{ steps.check.outputs.version }}" \
            --notes "${{ steps.changelog.outputs.content }}" \
            --target "${{ github.sha }}"

      - name: Update alias tags
        if: steps.check.outputs.skip == 'false'
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          MAJOR="v$(echo "${VERSION#v}" | cut -d. -f1)"
          MINOR="v$(echo "${VERSION#v}" | cut -d. -f1-2)"
          git tag -f "$MAJOR" "${{ github.sha }}"
          git tag -f "$MINOR" "${{ github.sha }}"
          git push origin "$MAJOR" "$MINOR" --force
